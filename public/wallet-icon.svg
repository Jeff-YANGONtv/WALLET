<svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="walletGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b4ff"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
  </defs>
  <!-- Cards sticking out -->
  <rect x="22" y="14" width="20" height="30" rx="3" fill="#003d66" transform="rotate(-12 32 29)"/>
  <rect x="24" y="12" width="18" height="30" rx="3" fill="#005599" transform="rotate(8 33 27)"/>
  <!-- Wallet body -->
  <rect x="8" y="28" width="48" height="32" rx="6" fill="url(#walletGrad)"/>
  <!-- Wallet bottom curve -->
  <ellipse cx="32" cy="60" rx="24" ry="8" fill="#004d99"/>
  <!-- Button clasp -->
  <rect x="8" y="36" width="12" height="10" rx="3" fill="#0099dd" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="16" cy="41" r="3" fill="#ffffff"/>
